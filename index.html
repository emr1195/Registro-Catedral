<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de Inscripción - Exploradores del Rey</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#1a3a82',
              dark: '#0f1c3f',
              red: '#b30000',
              yellow: '#ffcc00'
            }
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Oswald:wght@500;700&display=swap');

    :root {
      --brand-blue: #1a3a82;
      --brand-dark: #0f1c3f;
      --brand-red: #b30000;
      --brand-yellow: #ffcc00;
    }

    body {
      background-color: #e2e8f0;
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    h1, h2, h3 {
      font-family: 'Oswald', sans-serif;
    }

    .a4-container {
      width: 210mm;
      min-height: 297mm;
      position: relative;
      background: #ffffff;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      border: 2px solid var(--brand-blue);
      overflow: hidden;
      margin: 0 auto;
    }

    .corner-logo {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 90px;
      height: 90px;
      object-fit: contain;
      z-index: 30;
    }

    .watermark-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 520px;
      max-width: 78%;
      transform: translate(-50%, -50%);
      opacity: 0.05;
      z-index: 2;
      pointer-events: none;
      object-fit: contain;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      position: relative;
      z-index: 10;
    }

    .custom-input,
    .custom-select,
    .custom-textarea {
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      transition: all 0.3s ease;
      border-radius: 10px;
      padding: 12px 16px;
      width: 100%;
      box-sizing: border-box;
    }

    .custom-input:focus,
    .custom-select:focus,
    .custom-textarea:focus {
      border-color: var(--brand-blue);
      outline: none;
      background: #ffffff;
      box-shadow: 0 0 0 2px rgba(26, 58, 130, 0.2);
    }

    .radio-container input[type="radio"] {
      display: none;
    }

    .radio-label {
      position: relative;
      padding: 10px 16px 10px 35px;
      cursor: pointer;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      color: #334155;
      font-weight: 600;
      background: #f8fafc;
      display: block;
      text-align: center;
    }

    .radio-label:before {
      content: '';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      background: #ffffff;
    }

    .radio-container input[type="radio"]:checked + .radio-label {
      background: #eff6ff;
      border-color: var(--brand-blue);
      color: var(--brand-blue);
    }

    .radio-container input[type="radio"]:checked + .radio-label:after {
      content: '';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: var(--brand-blue);
      border-radius: 50%;
    }

    .submit-btn {
      background: linear-gradient(135deg, var(--brand-blue), var(--brand-dark));
      border: none;
      cursor: pointer;
    }

    .submit-btn:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <div class="a4-container">
    <img src="emblema bandera 3.0.png" alt="Logo Exploradores del Rey" class="corner-logo">
    <img src="emblema bandera 3.0.png" alt="Marca de agua" class="watermark-logo">

    <div class="p-10 relative z-20 h-full flex flex-col">
      <header class="text-center mb-8 border-b-2 border-blue-200 pb-6 relative">
        <h2 class="text-red-700 tracking-widest text-lg font-bold mb-1">Destacamento N°1</h2>
        <h1 class="text-5xl font-extrabold text-blue-900 tracking-wide uppercase">
          Exploradores del Rey
        </h1>
        <p class="text-gray-600 mt-2 font-medium tracking-wide">FORMULARIO DE INSCRIPCIÓN OFICIAL</p>
        <div class="w-32 h-1 bg-yellow-400 mx-auto mt-4 rounded-full"></div>
      </header>

      <form id="registerForm" class="flex-grow flex flex-col gap-6">
        <div class="glass-panel rounded-xl p-6">
          <h3 class="text-2xl text-blue-900 font-bold uppercase tracking-wider mb-5 border-b pb-2">
            Datos del Explorador
          </h3>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Nombre</label>
              <input type="text" id="name" class="custom-input" placeholder="Ej. Juan" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Apellido</label>
              <input type="text" id="lastname" class="custom-input" placeholder="Ej. Pérez" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Edad</label>
              <input type="number" id="age" min="1" class="custom-input" placeholder="Años" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Cédula</label>
              <input type="text" id="id" class="custom-input" placeholder="Ej. 8-000-0000" required>
            </div>

            <div class="md:col-span-2">
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Grado Escolar</label>
              <div class="radio-container grid grid-cols-1 sm:grid-cols-3 gap-3 mt-2">
                <div>
                  <input type="radio" id="primaria" name="grado" value="primaria">
                  <label for="primaria" class="radio-label text-sm">Primaria</label>
                </div>
                <div>
                  <input type="radio" id="primer_ciclo" name="grado" value="primer ciclo">
                  <label for="primer_ciclo" class="radio-label text-sm">Primer Ciclo</label>
                </div>
                <div>
                  <input type="radio" id="secundaria" name="grado" value="secundaria">
                  <label for="secundaria" class="radio-label text-sm">Secundaria</label>
                </div>
              </div>
            </div>

            <div class="md:col-span-2">
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Dirección</label>
              <textarea id="address" rows="2" class="custom-textarea" placeholder="Dirección exacta" required></textarea>
            </div>

            
          </div>
        </div>

        <div class="glass-panel rounded-xl p-6">
          <h3 class="text-2xl text-red-700 font-bold uppercase tracking-wider mb-5 border-b pb-2">
            Datos del Acudiente
          </h3>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="md:col-span-2">
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Nombre del Acudiente</label>
              <input type="text" id="guardianName" class="custom-input" placeholder="Nombre completo del responsable" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Teléfono</label>
              <input type="tel" id="guardianPhone" class="custom-input" placeholder="Ej. 6000-0000" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Correo Electrónico</label>
              <input type="email" id="guardianEmail" class="custom-input" placeholder="correo@ejemplo.com" required>
            </div>
          </div>
        </div>

        <div class="mt-auto pt-4 text-center">
          <button id="submitBtn" type="submit" class="submit-btn w-full text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all duration-200">
            Registrar Explorador
          </button>
          <p class="text-xs text-gray-500 mt-4 italic">
            Al enviar este formulario, el acudiente autoriza la participación del explorador en las actividades.
          </p>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getDatabase, ref, push, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC1v68q4JAT7-UPLxx7szlw09m-Gp-kf98",
      authDomain: "registro-er-pty.firebaseapp.com",
      databaseURL: "https://registro-er-pty-default-rtdb.firebaseio.com",
      projectId: "registro-er-pty",
      storageBucket: "registro-er-pty.appspot.com",
      messagingSenderId: "129034311168",
      appId: "1:129034311168:web:7e43faa000eb0459ef6ae5",
      measurementId: "G-QWBYRGGRF5"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const form = document.getElementById("registerForm");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      console.log("Submit detectado");

      const name = document.getElementById("name").value.trim();
      const lastname = document.getElementById("lastname").value.trim();
      const id = document.getElementById("id").value.trim();
      const age = document.getElementById("age").value.trim();
      const address = document.getElementById("address").value.trim();
      const church = document.getElementById("church").value;
      const grade = document.querySelector('input[name="grado"]:checked')?.value;
      const guardianName = document.getElementById("guardianName").value.trim();
      const guardianPhone = document.getElementById("guardianPhone").value.trim();
      const guardianEmail = document.getElementById("guardianEmail").value.trim();

      if (!grade) {
        alert("Por favor selecciona un grado escolar.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Registrando...";

      try {
        const registrosRef = ref(database, "registros");

        const registrosQuery = query(registrosRef, orderByChild("id"), equalTo(id));
        const snapshot = await get(registrosQuery);

        if (snapshot.exists()) {
          alert("Este usuario ya está registrado.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Registrar Explorador";
          return;
        }

        await push(registrosRef, {
          name,
          lastname,
          fullName: `${name} ${lastname}`,
          id,
          age,
          grade,
          address,
          church,
          guardianName,
          guardianPhone,
          guardianEmail,
          createdAt: new Date().toISOString()
        });

        alert("Registro exitoso");
        form.reset();
      } catch (error) {
        console.error("Error completo al registrar:", error);
        alert("Hubo un error al registrar. Revisa la consola con F12.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Registrar Explorador";
      }
    });
  </script>
</body>
</html>
