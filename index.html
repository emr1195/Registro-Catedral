<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de Inscripción - Exploradores del Rey</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-database-compat.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#1a3a82',
              dark: '#0f1c3f',
              red: '#b30000',
              yellow: '#ffcc00'
            }
          }
        }
      }
    }
  </script>

  <style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Oswald:wght@500;700&display=swap');

  :root {
    --brand-blue: #1a3a82;
    --brand-dark: #0f1c3f;
    --brand-red: #b30000;
    --brand-yellow: #ffcc00;
  }

  * {
    box-sizing: border-box;
  }

  body {
    background-color: #e2e8f0;
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 12px;
    display: flex;
    justify-content: center;
  }

  h1, h2, h3 {
    font-family: 'Oswald', sans-serif;
    margin: 0;
  }

  .a4-container {
    width: 100%;
    max-width: 900px;
    min-height: 100vh;
    position: relative;
    background: #ffffff;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    border: 2px solid var(--brand-blue);
    overflow: hidden;
    margin: 0 auto;
  }

  .corner-logo {
    position: absolute;
    top: 14px;
    left: 14px;
    width: 78px;
    height: 78px;
    object-fit: contain;
    z-index: 30;
  }

  .watermark-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    width: min(520px, 78%);
    transform: translate(-50%, -50%);
    opacity: 0.05;
    z-index: 2;
    pointer-events: none;
    object-fit: contain;
  }

  .content-wrap {
    padding: 40px;
    position: relative;
    z-index: 20;
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }

  .page-header {
    text-align: center;
    margin-bottom: 32px;
    border-bottom: 2px solid #bfdbfe;
    padding-bottom: 24px;
    position: relative;
  }

  .page-header h2 {
    color: #b91c1c;
    letter-spacing: 0.18em;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .page-header h1 {
    color: #1e3a8a;
    font-size: 4rem;
    line-height: 0.95;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .page-header p {
    color: #4b5563;
    margin-top: 14px;
    font-size: 1.15rem;
    line-height: 1.45;
    letter-spacing: 0.05em;
  }

  .header-line {
    width: 130px;
    height: 5px;
    background: var(--brand-yellow);
    border-radius: 999px;
    margin: 18px auto 0;
  }

  .glass-panel {
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    position: relative;
    z-index: 10;
    border-radius: 18px;
    padding: 24px;
  }

  .custom-input,
  .custom-select,
  .custom-textarea {
    background: #f8fafc;
    border: 1px solid #cbd5e1;
    color: #1e293b;
    transition: all 0.3s ease;
    border-radius: 12px;
    padding: 14px 16px;
    width: 100%;
    font-size: 1rem;
  }

  .custom-input:focus,
  .custom-select:focus,
  .custom-textarea:focus {
    border-color: var(--brand-blue);
    outline: none;
    background: #ffffff;
    box-shadow: 0 0 0 2px rgba(26, 58, 130, 0.2);
  }

  .radio-container input[type="radio"] {
    display: none;
  }

  .radio-label {
    position: relative;
    padding: 12px 16px 12px 38px;
    cursor: pointer;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    color: #334155;
    font-weight: 600;
    background: #f8fafc;
    display: block;
    text-align: center;
    min-height: 48px;
  }

  .radio-label:before {
    content: '';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border: 2px solid #cbd5e1;
    border-radius: 50%;
    background: #ffffff;
  }

  .radio-container input[type="radio"]:checked + .radio-label {
    background: #eff6ff;
    border-color: var(--brand-blue);
    color: var(--brand-blue);
  }

  .radio-container input[type="radio"]:checked + .radio-label:after {
    content: '';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: var(--brand-blue);
    border-radius: 50%;
  }

  .submit-btn {
    background: linear-gradient(135deg, var(--brand-blue), var(--brand-dark));
    border: none;
    cursor: pointer;
    width: 100%;
    color: white;
    font-weight: 700;
    padding: 16px 20px;
    border-radius: 14px;
    box-shadow: 0 10px 18px rgba(15, 28, 63, 0.18);
    font-size: 1rem;
  }

  .submit-btn:hover {
    filter: brightness(1.05);
  }

  .section-title {
    font-size: 2rem;
    color: #1e3a8a;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #d1d5db;
  }

  .section-title.red {
    color: #b91c1c;
  }

  .field-label {
    display: block;
    font-size: 0.9rem;
    font-weight: 700;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 8px 2px;
  }

  .form-stack {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .full {
    grid-column: 1 / -1;
  }

  .footer-note {
    font-size: 0.75rem;
    color: #6b7280;
    margin-top: 14px;
    font-style: italic;
    text-align: center;
  }

  @media (max-width: 768px) {
    body {
      padding: 8px;
    }

    .a4-container {
      max-width: 100%;
      min-height: auto;
      border-width: 1.5px;
    }

    .content-wrap {
      padding: 20px 16px 24px;
    }

    .corner-logo {
      top: 10px;
      left: 10px;
      width: 56px;
      height: 56px;
    }

    .watermark-logo {
      width: 88%;
      opacity: 0.04;
    }

    .page-header {
      margin-bottom: 22px;
      padding-top: 8px;
      padding-bottom: 18px;
    }

    .page-header h2 {
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      margin-left: 54px;
    }

    .page-header h1 {
      font-size: 3rem;
      line-height: 0.92;
      margin-top: 8px;
    }

    .page-header p {
      font-size: 0.95rem;
      line-height: 1.35;
      margin-top: 10px;
      padding: 0 6px;
    }

    .header-line {
      width: 96px;
      height: 4px;
      margin-top: 14px;
    }

    .glass-panel {
      padding: 18px 16px;
      border-radius: 16px;
    }

    .section-title {
      font-size: 1.55rem;
      line-height: 1.05;
      margin-bottom: 16px;
    }

    .grid-2 {
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .radio-container {
      grid-template-columns: 1fr !important;
    }

    .custom-input,
    .custom-select,
    .custom-textarea {
      font-size: 16px;
    }

    .submit-btn {
      padding: 15px 18px;
      font-size: 1rem;
    }
  }

  @media (max-width: 420px) {
    .content-wrap {
      padding: 18px 12px 22px;
    }

    .corner-logo {
      width: 50px;
      height: 50px;
    }

    .page-header h2 {
      font-size: 0.82rem;
      margin-left: 46px;
    }

    .page-header h1 {
      font-size: 2.45rem;
    }

    .page-header p {
      font-size: 0.88rem;
    }

    .section-title {
      font-size: 1.35rem;
    }

    .field-label {
      font-size: 0.82rem;
    }
  }
</style>

</head>
<body>
  <div class="a4-container">
    <img src="emblema bandera 3.0.png" alt="Logo Exploradores del Rey" class="corner-logo">
    <img src="emblema bandera 3.0.png" alt="Marca de agua" class="watermark-logo">

    <div class="content-wrap">
      <header class="page-header">
        <h2>Destacamento N°1</h2>
        <h1>Exploradores<br>del Rey</h1>
        <p>FORMULARIO DE INSCRIPCIÓN OFICIAL</p>
        <div class="header-line"></div>
      </header>

      <form id="registerForm" class="flex-grow flex flex-col gap-6">
        <div class="glass-panel rounded-xl p-6">
          <h3 class="section-title">Datos del Explorador</h3>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Nombre</label>
              <input type="text" id="name" class="custom-input" placeholder="Ej. Juan" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Apellido</label>
              <input type="text" id="lastname" class="custom-input" placeholder="Ej. Pérez" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Edad</label>
              <input type="number" id="age" min="1" class="custom-input" placeholder="Años" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Cédula</label>
              <input type="text" id="id" class="custom-input" placeholder="Ej. 8-000-0000" required>
            </div>

            <div class="md:col-span-2">
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Grado Escolar</label>
              <div class="radio-container grid grid-cols-1 sm:grid-cols-3 gap-3 mt-2">
                <div>
                  <input type="radio" id="primaria" name="grado" value="primaria">
                  <label for="primaria" class="radio-label text-sm">Primaria</label>
                </div>
                <div>
                  <input type="radio" id="primer_ciclo" name="grado" value="primer ciclo">
                  <label for="primer_ciclo" class="radio-label text-sm">Primer Ciclo</label>
                </div>
                <div>
                  <input type="radio" id="secundaria" name="grado" value="secundaria">
                  <label for="secundaria" class="radio-label text-sm">Secundaria</label>  
                </div>
              </div>
            </div>

            <div class="md:col-span-2">
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Dirección</label>
              <textarea id="address" rows="2" class="custom-textarea" placeholder="Dirección exacta" required></textarea>
            </div>

            
          </div>
        </div>

        <div class="glass-panel rounded-xl p-6">
          <h3 class="section-title red">Datos del Acudiente</h3>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="md:col-span-2">
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Nombre del Acudiente</label>
              <input type="text" id="guardianName" class="custom-input" placeholder="Nombre completo del responsable" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Teléfono</label>
              <input type="tel" id="guardianPhone" class="custom-input" placeholder="Ej. 6000-0000" required>
            </div>

            <div>
              <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Correo Electrónico</label>
              <input type="email" id="guardianEmail" class="custom-input" placeholder="correo@ejemplo.com" required>
            </div>
          </div>
        </div>

        <div class="mt-auto pt-4 text-center">
          <button id="submitBtn" type="submit" class="submit-btn w-full text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all duration-200">
            Registrar Explorador
          </button>
          <p class="text-xs text-gray-500 mt-4 italic">
            Al enviar este formulario, el acudiente autoriza la participación del explorador en las actividades.
          </p>
        </div>
      </form>
    </div>
  </div>

  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyC1v68q4JAT7-UPLxx7szlw09m-Gp-kf98",
    authDomain: "registro-er-pty.firebaseapp.com",
    databaseURL: "https://registro-er-pty-default-rtdb.firebaseio.com",
    projectId: "registro-er-pty",
    storageBucket: "registro-er-pty.appspot.com",
    messagingSenderId: "129034311168",
    appId: "1:129034311168:web:7e43faa000eb0459ef6ae5",
    measurementId: "G-QWBYRGGRF5"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  const form = document.getElementById("registerForm");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    console.log("Submit detectado");

    const name = document.getElementById("name").value.trim();
    const lastname = document.getElementById("lastname").value.trim();
    const id = document.getElementById("id").value.trim();
    const age = document.getElementById("age").value.trim();
    const address = document.getElementById("address").value.trim();
    const grade = document.querySelector('input[name="grado"]:checked')?.value;
    const guardianName = document.getElementById("guardianName").value.trim();
    const guardianPhone = document.getElementById("guardianPhone").value.trim();
    const guardianEmail = document.getElementById("guardianEmail").value.trim();

    if (!grade) {
      alert("Por favor selecciona un grado escolar.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Registrando...";

    try {
      const registrosRef = database.ref("registros");
      const snapshot = await registrosRef.orderByChild("id").equalTo(id).once("value");

      if (snapshot.exists()) {
        alert("Este usuario ya está registrado.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Registrar Explorador";
        return;
      }

      await registrosRef.push({
        name,
        lastname,
        fullName: `${name} ${lastname}`,
        id,
        age,
        grade,
        address,
        guardianName,
        guardianPhone,
        guardianEmail,
        createdAt: new Date().toISOString()
      });

      alert("Registro exitoso");
      form.reset();
    } catch (error) {
      console.error("Error completo al registrar:", error);
      alert("Hubo un error al registrar. Revisa la consola con F12.");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Registrar Explorador";
    }
  });
</script>
</body>
</html>
